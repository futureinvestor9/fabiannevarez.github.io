# Section A12 — 25 approved swaps. Used as a reference/regeneration aid when
# the validator flags a banned phrase (A11) in generated text.
swaps:
  - avoid: "AI expert"
    say_instead: "I use AI tools to structure workflows, analyze messy operational data, and improve decision-making — validated against real outcomes."
  - avoid: "Salesforce Administrator"
    say_instead: "Hands-on Salesforce data quality, governance support, and CRM accuracy work at JLL Technologies."
  - avoid: "Proficient in SQL"
    say_instead: "Working knowledge of SQL; actively building it through hands-on projects."
  - avoid: "Proficient in Python"
    say_instead: "Python exposure through operational data analysis projects; comfortable reading and adapting scripts."
  - avoid: "Data scientist"
    say_instead: "Analyst who builds performance baselines and decision rules from raw operational data."
  - avoid: "Automation engineer"
    say_instead: "Designed multi-tool workflows (CRM, spreadsheets, AI tools) with Zapier-style automation thinking."
  - avoid: "RevOps leader"
    say_instead: "RevOps-focused analyst with CRM operations and Salesforce data quality experience."
  - avoid: "Transformed operations"
    say_instead: "Converted an inconsistent follow-up process into a documented quarterly cadence system with measurable completion tracking."
  - avoid: "Managed a sales team"
    say_instead: "Managed a ~400-lead pipeline end-to-end, from first contact through closing."
  - avoid: "Expert negotiator"
    say_instead: "Negotiated a residential purchase from ~$250K to $223K on behalf of a client."
  - avoid: "High-performing salesperson"
    say_instead: "Sustained ~1,000 outbound dials per week with structured follow-up tracking."
  - avoid: "Built a CRM"
    say_instead: "Designed and operated a CRM cadence and tagging system in Follow Up Boss."
  - avoid: "Data-driven decision maker"
    say_instead: "Built a three-tier decision framework with explicit $/mile and $/hour thresholds, validated against 75+ real data points."
  - avoid: "Process improvement expert"
    say_instead: "I map informal workflows, define stages and rules, and document them so anyone can run them."
  - avoid: "Power BI experience"
    say_instead: "Power BI exposure; primary reporting work in Excel and Google Sheets (pivot tables, XLOOKUP, dashboards)."
  - avoid: "Requirements gathering experience"
    say_instead: "Client discovery experience: asking structured questions to surface the real problem before proposing solutions."
  - avoid: "KPI expert"
    say_instead: "Defined and tracked activity-to-outcome KPIs: cadence completion, response rate by channel, funnel movement."
  - avoid: "Full-stack marketer/operator"
    say_instead: "I've worked both sides: carrying the activity targets and building the systems that track them."
  - avoid: "Entrepreneur"
    say_instead: "Ran my own book of business, which meant owning the CRM, the pipeline, and the reporting myself."
  - avoid: "Growth hacker"
    say_instead: "I find the leak in the funnel and build a repeatable process to close it."
  - avoid: "Managed complex projects"
    say_instead: "Built and maintained a multi-tool operating stack: Follow Up Boss, REDX, Homebot, Google Sheets."
  - avoid: "Excellent communicator"
    say_instead: "Years of client-facing work translating messy situations into clear next steps and plain-language tradeoffs."
  - avoid: "Fast learner"
    say_instead: "Self-taught Follow Up Boss, REDX, Mystro, Gridwise, and AI tooling on the job — I pick up systems by using them."
  - avoid: "Passionate about AI"
    say_instead: "I've shipped AI-assisted analysis with a validation step — cross-checking model recommendations against actual earnings data."
  - avoid: "Rideshare driver"
    say_instead: "Independent operator — treated rideshare as an operations optimization project: built performance baselines, decision thresholds, and a documented analysis system (GitHub portfolio)."
