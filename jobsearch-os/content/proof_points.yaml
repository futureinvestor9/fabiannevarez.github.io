    dm_phrasing: "I negotiate and manage client relationships end-to-end, from first contact through close."

  - id: tool_stack
    title: "Follow Up Boss + REDX + Homebot + Sheets stack"
    tags: [crm, process]
    metric: "multi-tool workflow integration"
    resume_phrasing: "Built and maintained a multi-tool operating stack: Follow Up Boss, REDX, Homebot, Google Sheets."
    cover_letter_phrasing: "CRM discipline isn't software — it's rules, clean data, and measurement. I've built all three."
    dm_phrasing: "I integrate disconnected tools (CRM, spreadsheets, AI tools) into one working system."

  - id: github_portfolio
    title: "GitHub portfolio of documented systems projects"
    tags: [data, process, ai]
    metric: "github.com/futureinvestor9"
    resume_phrasing: "Documented operations projects (CRM cadence design, data analysis frameworks) publicly on GitHub."
    cover_letter_phrasing: "Every project on my GitHub follows the same arc: messy reality, structure, validation, documentation."
    dm_phrasing: "I document my systems work publicly on GitHub if you'd like to see the process, not just the resume line."
